{% extends 'shared/base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <h2 class="text-center text-success">
                        Create Account
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Join AI Room Availability Platform
                    </p>

                    <form>

                        <div class="mb-3">

                            <label>Name</label>

                            <input type="text"
                                   class="form-control"
                                   placeholder="Full Name">

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input type="email"
                                   class="form-control"
                                   placeholder="Email Address">

                        </div>

                        <div class="mb-3">

                            <label>Phone</label>

                            <input type="text"
                                   class="form-control"
                                   placeholder="Phone Number">

                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input type="password"
                                   class="form-control"
                                   placeholder="Password">

                        </div>

                        <div class="mb-4">

                            <label>Confirm Password</label>

                            <input type="password"
                                   class="form-control"
                                   placeholder="Confirm Password">

                        </div>

                        <a href="{{ url_for('main.select_role') }}"
                           class="btn btn-success w-100">

                            Continue

                        </a>

                    </form>

                    <hr>

                    <p class="text-center">

                        Already have an account?

                        <a href="{{ url_for('main.login') }}">

                            Login

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
