{% extends "base.html" %}

{% block title %}Add Room{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Add New Room</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Room Title</label>
                    <input type="text"
                           name="title"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Description</label>
                    <textarea
                        name="description"
                        class="form-control"
                        rows="4"
                        required></textarea>
                </div>

                <div class="mb-3">
                    <label>Room Type</label>

                    <select
                        name="room_type"
                        class="form-select"
                        required>

                        <option value="PG">PG</option>
                        <option value="Hostel">Hostel</option>
                        <option value="Flat">Flat</option>
                        <option value="Room">Room</option>

                    </select>

                </div>

                <div class="row">

                    <div class="col-md-6">

                        <label>Rent</label>

                        <input
                            type="number"
                            name="rent"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6">

                        <label>Deposit</label>

                        <input
                            type="number"
                            name="deposit"
                            class="form-control">

                    </div>

                </div>

                <br>

                <div class="mb-3">

                    <label>Address</label>

                    <input
                        type="text"
                        name="address"
                        class="form-control"
                        required>

                </div>

                <div class="row">

                    <div class="col-md-4">

                        <label>City</label>

                        <input
                            type="text"
                            name="city"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4">

                        <label>Area</label>

                        <input
                            type="text"
                            name="area"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4">

                        <label>Pincode</label>

                        <input
                            type="text"
                            name="pincode"
                            class="form-control"
                            required>

                    </div>

                </div>

                <br>

                <div class="row">

                    <div class="col-md-6">

                        <label>Bedrooms</label>

                        <input
                            type="number"
                            name="bedrooms"
                            class="form-control"
                            value="1">

                    </div>

                    <div class="col-md-6">

                        <label>Bathrooms</label>

                        <input
                            type="number"
                            name="bathrooms"
                            class="form-control"
                            value="1">

                    </div>

                </div>

                <br>

                <div class="form-check">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        name="furnished">

                    <label class="form-check-label">

                        Furnished

                    </label>

                </div>

                <br>

                <button
                    type="submit"
                    class="btn btn-success">

                    Add Room

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
