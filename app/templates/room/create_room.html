<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Room</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .form-container{
            max-width:900px;
            margin:40px auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 2px 15px rgba(0,0,0,.15);
        }

        footer{
            margin-top:40px;
            background:#0d6efd;
            color:#fff;
            text-align:center;
            padding:15px;
        }
    </style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="/">🏠 RoomFinder</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/search">Search Rooms</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="/create-room">Add Room</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/profile">Profile</a>
</li>

</ul>

</div>

</div>

</nav>

<!-- Form -->

<div class="container">

<div class="form-container">

<h2 class="text-center mb-4">
Add New Room
</h2>

<form>

<div class="mb-3">
<label class="form-label">Room Title</label>
<input type="text" class="form-control" placeholder="Enter Room Title">
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea class="form-control" rows="4"
placeholder="Enter Room Description"></textarea>
</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Location</label>
<input type="text" class="form-control" placeholder="City / Area">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Monthly Rent</label>
<input type="number" class="form-control" placeholder="₹5000">
</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Room Type</label>

<select class="form-select">

<option>Select Room Type</option>

<option>Single Room</option>

<option>Shared Room</option>

<option>PG</option>

<option>Flat</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Available Beds</label>

<input type="number"
class="form-control"
placeholder="2">

</div>

</div>

<div class="mb-3">

<label class="form-label">Facilities</label>

<div class="row">

<div class="col-md-4">
<input type="checkbox"> WiFi
</div>

<div class="col-md-4">
<input type="checkbox"> Parking
</div>

<div class="col-md-4">
<input type="checkbox"> CCTV
</div>

<div class="col-md-4">
<input type="checkbox"> Laundry
</div>

<div class="col-md-4">
<input type="checkbox"> Food
</div>

<div class="col-md-4">
<input type="checkbox"> AC
</div>

</div>

</div>

<div class="mb-3">

<label class="form-label">
Upload Room Image
</label>

<input type="file"
class="form-control">

</div>

<div class="mb-3">

<label class="form-label">
Owner Contact Number
</label>

<input type="tel"
class="form-control"
placeholder="9876543210">

</div>

<div class="d-grid">

<button class="btn btn-success btn-lg">

<i class="bi bi-plus-circle"></i>

Add Room

</button>

</div>

</form>

</div>

</div>

<footer>

© 2026 Room Availability Platform

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
