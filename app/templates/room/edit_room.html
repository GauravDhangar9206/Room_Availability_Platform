```html
{% extends "base.html" %}

{% block title %}Edit Room{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">

            <h3>Edit Room</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">Room Title</label>

                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        value="{{ room.title }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Description</label>

                    <textarea
                        name="description"
                        class="form-control"
                        rows="4"
                        required>{{ room.description }}</textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">Room Type</label>

                    <select
                        name="room_type"
                        class="form-select"
                        required>

                        <option value="PG" {% if room.room_type == "PG" %}selected{% endif %}>PG</option>

                        <option value="Hostel" {% if room.room_type == "Hostel" %}selected{% endif %}>Hostel</option>

                        <option value="Flat" {% if room.room_type == "Flat" %}selected{% endif %}>Flat</option>

                        <option value="Room" {% if room.room_type == "Room" %}selected{% endif %}>Room</option>

                    </select>

                </div>

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">Rent</label>

                        <input
                            type="number"
                            name="rent"
                            class="form-control"
                            value="{{ room.rent }}"
                            required>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">Deposit</label>

                        <input
                            type="number"
                            name="deposit"
                            class="form-control"
                            value="{{ room.deposit }}">

                    </div>

                </div>

                <br>

                <div class="mb-3">

                    <label class="form-label">Address</label>

                    <input
                        type="text"
                        name="address"
                        class="form-control"
                        value="{{ room.address }}"
                        required>

                </div>

                <div class="row">

                    <div class="col-md-4">

                        <label class="form-label">City</label>

                        <input
                            type="text"
                            name="city"
                            class="form-control"
                            value="{{ room.city }}"
                            required>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">Area</label>

                        <input
                            type="text"
                            name="area"
                            class="form-control"
                            value="{{ room.area }}"
                            required>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">Pincode</label>

                        <input
                            type="text"
                            name="pincode"
                            class="form-control"
                            value="{{ room.pincode }}"
                            required>

                    </div>

                </div>

                <br>

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">Bedrooms</label>

                        <input
                            type="number"
                            name="bedrooms"
                            class="form-control"
                            value="{{ room.bedrooms }}"
                            required>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">Bathrooms</label>

                        <input
                            type="number"
                            name="bathrooms"
                            class="form-control"
                            value="{{ room.bathrooms }}"
                            required>

                    </div>

                </div>

                <br>

                <div class="form-check">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        name="furnished"
                        {% if room.furnished %}checked{% endif %}>

                    <label class="form-check-label">

                        Furnished

                    </label>

                </div>

                <br>
                     <div class="mb-3">

                    <label class="form-label">

                        Upload Room Images

                    </label>

                    <input
                        type="file"
                        name="images"
                        class="form-control"
                        accept=".jpg,.jpeg,.png"
                        multiple>

                    <div class="form-text">

                        You can upload multiple room images.

                    </div>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Update Room

                </button>

                <a href="{{ url_for('room.room_detail', room_id=room.id) }}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
```
